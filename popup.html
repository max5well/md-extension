<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Copy as Markdown</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      width: 260px;
      padding: 20px 16px 16px;
      background: #160828;
      color: #ffffff;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .logo {
      width: 36px;
      height: 36px;
      border-radius: 9px;
      flex-shrink: 0;
    }

    .header-text {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    h1 {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: #ffffff;
      text-transform: uppercase;
      line-height: 1;
    }

    .tagline {
      font-size: 10px;
      color: rgba(255,255,255,0.45);
      letter-spacing: 0.02em;
    }

    button#copy-btn {
      width: 100%;
      padding: 11px 14px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #EC008C 0%, #00DCC8 100%);
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: opacity 0.15s, transform 0.1s;
      position: relative;
    }

    button#copy-btn:hover  { opacity: 0.88; }
    button#copy-btn:active { opacity: 0.75; transform: scale(0.98); }
    button#copy-btn:disabled {
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.3);
      cursor: default;
      transform: none;
      opacity: 1;
    }

    #status {
      margin-top: 10px;
      font-size: 12px;
      min-height: 18px;
      text-align: center;
      transition: color 0.2s;
      color: rgba(255,255,255,0.4);
    }

    #status.success { color: #00DCC8; }
    #status.error   { color: #EC008C; }
    #status.loading { color: rgba(255,255,255,0.4); }
  </style>
</head>
<body>
  <div class="header">
    <img class="logo" src="icons/icon128.png" alt="md logo" />
    <div class="header-text">
      <h1>Copy as Markdown</h1>
      <span class="tagline">One click. LLM-ready.</span>
    </div>
  </div>
  <button id="copy-btn">Copy Page</button>
  <p id="status"></p>
  <script src="popup.js"></script>
</body>
</html>
