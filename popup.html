<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Copy as Markdown</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      width: 260px;
      padding: 16px;
      background: #0f0f0f;
      color: #f0f0f0;
    }

    h1 {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.03em;
      color: #a0a0a0;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    button#copy-btn {
      width: 100%;
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    button#copy-btn:hover { background: #1d4ed8; }
    button#copy-btn:active { background: #1e40af; }
    button#copy-btn:disabled { background: #374151; cursor: default; }

    #status {
      margin-top: 10px;
      font-size: 12px;
      min-height: 18px;
      text-align: center;
      transition: color 0.2s;
    }

    #status.success { color: #4ade80; }
    #status.error   { color: #f87171; }
    #status.loading { color: #9ca3af; }
  </style>
</head>
<body>
  <h1>Copy as Markdown</h1>
  <button id="copy-btn">Copy Page</button>
  <p id="status"></p>
  <script src="popup.js"></script>
</body>
</html>
